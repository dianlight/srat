[deps.go]
auto = true

[tools]
air = '1.65.3'
"go:github.com/securego/gosec/v2/cmd/gosec" = "v2.27.1"
oapi-codegen = "2.7.1"

[tasks]
clean = "go -C src clean && rm -rf dist"
dev = "SRAT_DEVMODE=true go tool -C src air -c .air.toml"
mount-remote = "umount -l /mnt/remote > /dev/null 2>&1 || : && mkdir -p /mnt/remote > /dev/null 2>&1 || : && sshfs -o reconnect,ServerAliveInterval=15,ServerAliveCountMax=3 ${HOMEASSISTANT_IP}:/addon_configs/local_sambanas2 /mnt/remote"

[tasks.update]
raw = true
run = [
  "go run -C src github.com/oligot/go-mod-upgrade",
  "go -C src mod vendor",
  "go -C src mod tidy",
]
depends_post = [
    { task = "patch" },
]

[tasks.build]
tools = { zig = "0.15.2" }
usage = '''
flag "--version <version>" help="Build version"  env="VERSION"
flag "--arch <arch>" help="Target architecture" env="ARCH" {
  choices "x86_64" "aarch64"
}
flag "--sentry_dsn <sentry_dsn>" help="Sentry DSN" env="SENTRY_DSN"
flag "--pprof" help="Include pprof profiling support" 
flag "--zig" help="Use Zig as the C compiler for musl dynamic build (produces srat-server-musl)"
flag "--cgo" help="Enable CGO for glibc dynamic build (produces srat-server-glib)"
arg "<gist_token>" help="GitHub Gist token" env="GIST_TOKEN"
'''
depends = [
  { task = "patch" },
  { task = "metadata",args = ['--version={{usage.version | default(value=env.VERSION)}}'] },
]
#env = { _.file = "/tmp/.env.tmp" }
run = [
    '''
      # Frontend and custom component builds only run for the static (default) variant.
      if [ -z "$usage_zig" ] && [ -z "$usage_cgo" ]; then
        mise //frontend:build:static --version ${usage_version?} src/web/static
        mise //custom_components:package-hacs -- --output ../backend/src/internal/assets/srat.zip --version ${usage_version?}
      fi
    ''',
    'echo "Building ${usage_version?} for architecture ${usage_arch?}..."',
    'mkdir -p dist/${usage_arch?} || :',
    'touch dist/${usage_arch?}/.keep',
    '''
      set +x +e
      CGO_CFLAGS='-DELF_METADATA="{\"version\":\"v'"${usage_version?}"'\"}"'
      GOOS=linux
      if [ "$usage_arch" = "aarch64" ]; then
        GOARCH=arm64
      else
        GOARCH=amd64
      fi

      LDFLAGS="-s -w \
           -X github.com/dianlight/srat/config.Version=${usage_version?} \
           -X github.com/dianlight/srat/config.CommitHash=$(git rev-parse --short HEAD) \
           -X github.com/dianlight/srat/config.BuildTimestamp=$(date +%Y-%m-%dT%H:%M:%S) \
           -X github.com/dianlight/srat/config.SentryDSN=${usage_sentry_dsn:-disabled} \
           -X github.com/dianlight/srat/config.GistToken=${usage_gist_token?}"

      if [ -n "$usage_zig" ]; then
        # Musl dynamic build: srat-server-musl (CGO + zig musl cross-compiler)
        CGO_ENABLED=1
        GOTAGS="p${usage_pprof:+prof},embedallowed,smartlib"
        CC="zig cc -target ${usage_arch?}-linux-musl"
        export CC CGO_CFLAGS GOOS GOARCH CGO_ENABLED GOTAGS
        echo "Building srat-server-musl (CGO + zig-musl)..."
        go build -C src -tags="$GOTAGS" -ldflags="$LDFLAGS" -o ../dist/${usage_arch?}/srat-server-musl ./cmd/srat-server
      elif [ -n "$usage_cgo" ]; then
        # Glibc dynamic build: ensure aarch64 cross-compiler is available when needed
        if [ "$usage_arch" = "aarch64" ] && ! command -v aarch64-linux-gnu-gcc >/dev/null 2>&1; then
          echo "aarch64-linux-gnu-gcc not found; installing..."
          sudo apt-get update -qq && sudo apt-get install -y gcc-aarch64-linux-gnu
        fi
        # Glibc dynamic build: srat-server-glib (CGO + system glibc)
        CGO_ENABLED=1
        GOTAGS="p${usage_pprof:+prof},embedallowed,smartlib"
        if [ "$usage_arch" = "aarch64" ]; then
          CC="aarch64-linux-gnu-gcc"
          export CC
        fi
        export CGO_CFLAGS GOOS GOARCH CGO_ENABLED GOTAGS
        echo "Building srat-server-glib (CGO + glibc)..."
        go build -C src -tags="$GOTAGS" -ldflags="$LDFLAGS" -o ../dist/${usage_arch?}/srat-server-glib ./cmd/srat-server
      else
        # Static build (default): srat-cli + srat-server-static + srat-server symlink
        CGO_ENABLED=0
        GOTAGS="p${usage_pprof:+prof},embedallowed"
        export CGO_CFLAGS GOOS GOARCH CGO_ENABLED GOTAGS
        echo "Building srat-cli (static)..."
        go build -C src -tags="$GOTAGS" -ldflags="$LDFLAGS" -o ../dist/${usage_arch?}/srat-cli ./cmd/srat-cli
        echo "Building srat-server-static (static)..."
        go build -C src -tags="$GOTAGS" -ldflags="$LDFLAGS" -o ../dist/${usage_arch?}/srat-server-static ./cmd/srat-server
        echo "Creating srat-server symlink -> srat-server-static..."
        ln -sf srat-server-static dist/${usage_arch?}/srat-server
      fi
    ''',
    '''
      set +x
      if [ -n "$usage_zig" ] || [ -n "$usage_cgo" ]; then
        echo "⚠ Static-linkage check skipped for dynamic variant build (--zig or --cgo flag set)"
      else
        echo "Verifying static linkage (musl/glibc portability) of dist/${usage_arch?}/..."
        all_static=true
        for bin in dist/${usage_arch?}/srat-server-static dist/${usage_arch?}/srat-cli; do
          [ -f "$bin" ] || continue
          if file "$bin" | grep -q "dynamically linked"; then
            echo "✗ PORTABILITY FAIL: $bin is dynamically linked — will not run on all libc environments"
            echo "  Hint: remove --cgo/--zig flag or ensure a fully static build (CGO_ENABLED=0)"
            all_static=false
          else
            echo "✓ Static: $bin"
          fi
        done
        if [ "$all_static" = "false" ]; then exit 1; fi
      fi
    ''',
    '''
      # Version verification only for static builds (uses srat-server-static)
      if [ -z "$usage_zig" ] && [ -z "$usage_cgo" ]; then
        echo "Verifying embedded version in dist/${usage_arch?}/srat-server-static..."
        set +x +e
        EMBEDDED_VERSION=$(../scripts/extract-binary-version.sh dist/${usage_arch?}/srat-server-static 2>&1)
        if [ $? -eq 0 ]; then
          if [ "$EMBEDDED_VERSION" = "v${usage_version?}" ]; then
            echo "✓ Version verified: $EMBEDDED_VERSION"
          else
            echo "✗ Version mismatch! Expected: v${usage_version?}, Got: $EMBEDDED_VERSION"
            exit 1
          fi
        else
          echo "⚠ Warning: Could not extract version from binary: $EMBEDDED_VERSION"
        fi
      fi
    '''
]
sources = ["src/**/*.go"]
outputs = ["dist/*/srat-server", "dist/*/srat-server-static", "dist/*/srat-server-musl", "dist/*/srat-server-glib", "dist/*/srat-cli"]
quiet = true

[tasks."build:remote"]
description = "Build the project for remote deployment and rsync binaries to HOMEASSISTANT_IP. Supports three server variants: static (default, CGO disabled), musl (dynamic via zig), and glib (dynamic via CGO+gcc). For static, both srat-cli and srat-server-static are deployed. For musl/glib, only the server variant binary is deployed (srat-cli is always static and does not need redeployment for dynamic-only updates)."
usage = '''
flag "--version <version>" help="Build version"  env="VERSION"
flag "--variant <variant>" help="Server variant to build and deploy: static (default), musl, or glib" default="static"
'''
depends = [
   { task = "clean" },
]
run = [
  '''
    set +x +e

    RESOLVED_VERSION="{{ usage.version | default(value='') }}"
    case "$RESOLVED_VERSION" in
      false|true|null|none)
        RESOLVED_VERSION=""
        ;;
    esac

    if [ -z "$RESOLVED_VERSION" ]; then
      if command -v ha >/dev/null 2>&1; then
        echo "Attempting to resolve version from Home Assistant CLI..."
        if ha info >/dev/null 2>&1; then
          REMOTE_VERSION=$(ha apps info local_sambanas2 2>/dev/null \
            | sed -nE 's/^[[:space:]]*version:[[:space:]]*v?([^[:space:]]+).*/\1/p' \
            | head -n1)

          if [ -n "$REMOTE_VERSION" ]; then
            RESOLVED_VERSION="$REMOTE_VERSION"
            echo "Using remote addon version from Home Assistant: $RESOLVED_VERSION"
          fi
        fi
      fi
    fi

    if [ -z "$RESOLVED_VERSION" ]; then
      RESOLVED_VERSION="${VERSION:-}"
      case "$RESOLVED_VERSION" in
        false|true|null|none)
          RESOLVED_VERSION=""
          ;;
      esac
      if [ -n "$RESOLVED_VERSION" ]; then
        echo "Using VERSION env fallback: $RESOLVED_VERSION"
      fi
    fi

    if [ -z "$RESOLVED_VERSION" ]; then
      echo "ERROR: Could not resolve build version. Provide --version, or ensure ha can connect using HA_ENDPOINT/HOMEASSISTANT_ENDPOINT and HA_TOKEN/HOMEASSISTANT_TOKEN, or set VERSION env as fallback."
      exit 1
    fi

    mise //backend:build -- --arch=x86_64 --pprof --version="$RESOLVED_VERSION"

    [ -n "${HOMEASSISTANT_IP}" ] || (echo "HOMEASSISTANT_IP is not set" && exit 1)
    rsync -avz --progress ./dist/x86_64/srat-cli ./dist/x86_64/srat-server ${HOMEASSISTANT_IP}:/addon_configs/local_sambanas2/upgrade/
  ''',
  '[ -n "${HOMEASSISTANT_IP}" ] || (echo "HOMEASSISTANT_IP is not set" && exit 1)',
  '''
  variant="{{usage.variant}}"
  version="{{usage.version | default(value=env.VERSION)}}"

  # srat-cli (static binary) is always deployed regardless of variant
  build_static_cli() {
    mise run build -- --arch=x86_64 --pprof "--version=$version"
  }

  case "$variant" in
    musl)
      # Build static first (for srat-cli), then musl variant
      build_static_cli
      mise run build -- --arch=x86_64 --pprof "--version=$version" --zig
      rsync -avz --progress "./dist/x86_64/srat-cli" "./dist/x86_64/srat-server-musl" "${HOMEASSISTANT_IP}:/addon_configs/local_sambanas2/upgrade/"
      ;;
    glib)
      # Build static first (for srat-cli), then glibc variant
      build_static_cli
      mise run build -- --arch=x86_64 --pprof "--version=$version" --cgo
      rsync -avz --progress "./dist/x86_64/srat-cli" "./dist/x86_64/srat-server-glib" "${HOMEASSISTANT_IP}:/addon_configs/local_sambanas2/upgrade/"
      ;;
    static)
      build_static_cli
      rsync -avz --progress "./dist/x86_64/srat-cli" "./dist/x86_64/srat-server-static" "${HOMEASSISTANT_IP}:/addon_configs/local_sambanas2/upgrade/"
      ;;
    *)
      echo "Unknown variant '$variant'. Valid options: static, musl, glib" && exit 1
      ;;
  esac
  '''
]
#quiet = true

[tasks."build:all"]
description = "Build binaries for all supported architectures (x86_64 and aarch64) in three variants: static (srat-server-static, srat-cli), musl dynamic (srat-server-musl via zig), and glibc dynamic (srat-server-glib via CGO). The srat-server symlink points to srat-server-static by default; the upgrade process updates it to the best variant for the running system."
usage = '''
flag "--version <version>" help="Build version"  env="VERSION"
flag "--sentry_dsn <sentry_dsn>" help="Sentry DSN" env="SENTRY_DSN"
flag "--pprof" help="Include pprof profiling support"
arg "<gist_token>" help="GitHub Gist token" env="GIST_TOKEN"
'''
run = [
  # x86_64: static (srat-cli + srat-server-static + srat-server symlink)
  '''
    EXTRA="--arch=x86_64 --version={{ usage.version | default(value=env.VERSION) }}"
    [ -n "$usage_sentry_dsn" ] && EXTRA="$EXTRA --sentry_dsn=$usage_sentry_dsn"
    [ -n "$usage_pprof" ] && EXTRA="$EXTRA --pprof"
    mise //backend:build -- $EXTRA
  ''',
  # x86_64: musl dynamic (srat-server-musl via zig)
  '''
    EXTRA="--arch=x86_64 --version={{ usage.version | default(value=env.VERSION) }} --zig"
    [ -n "$usage_sentry_dsn" ] && EXTRA="$EXTRA --sentry_dsn=$usage_sentry_dsn"
    [ -n "$usage_pprof" ] && EXTRA="$EXTRA --pprof"
    mise //backend:build -- $EXTRA
  ''',
  # x86_64: glibc dynamic (srat-server-glib via CGO)
  '''
    EXTRA="--arch=x86_64 --version={{ usage.version | default(value=env.VERSION) }} --cgo"
    [ -n "$usage_sentry_dsn" ] && EXTRA="$EXTRA --sentry_dsn=$usage_sentry_dsn"
    [ -n "$usage_pprof" ] && EXTRA="$EXTRA --pprof"
    mise //backend:build -- $EXTRA
  ''',
  # aarch64: static (srat-cli + srat-server-static + srat-server symlink)
  '''
    EXTRA="--arch=aarch64 --version={{ usage.version | default(value=env.VERSION) }}"
    [ -n "$usage_sentry_dsn" ] && EXTRA="$EXTRA --sentry_dsn=$usage_sentry_dsn"
    [ -n "$usage_pprof" ] && EXTRA="$EXTRA --pprof"
    mise //backend:build -- $EXTRA
  ''',
  # aarch64: musl dynamic (srat-server-musl via zig)
  '''
    EXTRA="--arch=aarch64 --version={{ usage.version | default(value=env.VERSION) }} --zig"
    [ -n "$usage_sentry_dsn" ] && EXTRA="$EXTRA --sentry_dsn=$usage_sentry_dsn"
    [ -n "$usage_pprof" ] && EXTRA="$EXTRA --pprof"
    mise //backend:build -- $EXTRA
  ''',
  # aarch64: glibc dynamic (srat-server-glib via CGO + aarch64-linux-gnu-gcc)
  '''
    EXTRA="--arch=aarch64 --version={{ usage.version | default(value=env.VERSION) }} --cgo"
    [ -n "$usage_sentry_dsn" ] && EXTRA="$EXTRA --sentry_dsn=$usage_sentry_dsn"
    [ -n "$usage_pprof" ] && EXTRA="$EXTRA --pprof"
    mise //backend:build -- $EXTRA
  ''',
]
quiet = true

[tasks."vendor:update"]
run = '''
  set +x +e;
  go -C src mod vendor;
  mise patch;
'''
quiet = true

[tasks."vendor:check"]
description = "Check if vendored dependencies are up to date. This task ensures that the vendored dependencies in the src/vendor directory are up to date with the go.mod file. It runs 'go mod vendor' to update the vendor directory and then checks if there are any changes. If there are changes, it outputs an error message indicating that the vendored dependencies are not up to date and exits with a non-zero status. If there are no changes, it confirms that the vendored dependencies are up to date."
run = '''
  set +x +e;
  go -C src list -mod=mod -m all >/dev/null || go -C src mod vendor;

'''
quiet = true

[tasks.patch]
description = "Apply necessary patches to vendored dependencies. This task ensures that any required fixes or modifications are applied to the vendored dependencies before building or testing the project. It checks for the presence of the 'patch' utility and applies patches defined in the 'patches' directory to the corresponding vendored dependencies. If any patch fails to apply, it will output an error message and exit. After applying patches, it cleans up any leftover .rej files and confirms that patches were applied successfully."
depends = [
    { task = "vendor:check" },
]
depends_post = [
    { task = "format:tidy" },
]
run = """
	set +x +e; 
	echo "Applying patches to vendored dependencies..."; 
	if ! command -v patch >/dev/null 2>&1; then 
		echo "ERROR: 'patch' command not found. Please install patch utility."; 
		exit 1; 
	fi; 
	go -C src mod vendor;
	# Regenerate Darwin vendor stubs deleted by `go mod vendor`.
	sh patches/create_darwin_stubs.sh src;
	find src/vendor -name "*.rej" -delete 2>/dev/null
	#if [ -f "patches/goenums.patch" ] && [ -d "src/vendor/github.com/zarldev/goenums" ]; then 
	#	echo "Applying goenums.patch..."; 
	#	patch -d src/vendor/github.com/zarldev/goenums -p1 < $(pwd)/patches/goenums.patch || (echo "ERROR: Failed to apply goenums.patch"; exit 1); 
    #touch src/vendor/github.com/zarldev/goenums/.pdone
	#fi
	if [ -f "patches/hd-idle-check-power-mode.patch" ] && [ -d "src/vendor/github.com/adelolmo/hd-idle/sgio" ]; then 
		echo "Applying hd-idle-check-power-mode.patch..."; 
		patch -d src/vendor/github.com/adelolmo/hd-idle/sgio -p1 < $(pwd)/patches/hd-idle-check-power-mode.patch || (echo "ERROR: Failed to apply hd-idle-check-power-mode.patch"; exit 1); 
    touch src/vendor/github.com/adelolmo/hd-idle/sgio/.pdone
	fi
	if [ -f "patches/gorm-generics.patch" ] && [ -d "src/vendor/gorm.io/gorm" ]; then 
		echo "Applying gorm-generics.patch..."; 
		patch -d src/vendor/gorm.io/gorm -p1 < $(pwd)/patches/gorm-generics.patch || (echo "ERROR: Failed to apply gorm-generics.patch"; exit 1); 
    touch src/vendor/gorm.io/gorm/.pdone
	fi 
  find $(pwd)/src/vendor -name "*.rej" -delete || (echo "WARNING: Some patches could not be applied"; exit 0);
	echo "Patches applied successfully"
"""
sources = ["patches/*.patch"]
outputs = ["src/vendor/**/*.pdone"]
quiet = true

[tasks."format:tidy"]
description = "Run 'go mod tidy' to clean up go.mod and go.sum files."
run = "go -C src mod tidy"
quiet = true

[tasks.format]
alias = ["fmt","lint"]
depends = [
    { task = "patch" },
]
depends_post = [
    { task = "security" },
]
run = [
	{ task = "format:tidy" },
	"go -C src vet ./... ",
	"go tool -C src  testifylint --fix ./... ",
	"go -C src fmt ./..."
]
quiet = true

[tasks.test]
depends = [
    { task = "patch" },
]
run = [
	"go -C src tool gotest -p 1 -failfast  -timeout 120s -tags embedallowed_no  -coverprofile=coverage.out -cover ./...",
	"go -C src tool cover -func=coverage.out | grep total: | awk '{print \"Total coverage: \" $3}'",
  "git restore test/data/image.dmg"
]
quiet = true

[tasks.metadata]
usage = '''
flag "--version [version]" help="Build version"
'''
run =[
	'echo "Generating metadata constants ${usage_version:?}..."',
  'echo "// Code generated by mise task; DO NOT EDIT." > src/config/metadata_constants.go',
	'echo "//go:build !cgo || !linux" >> src/config/metadata_constants.go',
	'echo "" >> src/config/metadata_constants.go',
	'echo "package config" >> src/config/metadata_constants.go',
	'echo "const MetadataJSON = \"SRAT_METADATA:{\\\"version\\\": \\\"v${usage_version:?}\\\"}\"" >> src/config/metadata_constants.go',
]
outputs = ["src/config/metadata_constants.go"]
hide = true
quiet = true

[tasks.security]
run = [
  "go run -C src golang.org/x/vuln/cmd/govulncheck@latest ./...",
  "cd src; gosec -exclude-generated -severity high -confidence high ./..."
]

[tasks."generate:openapi"]
alias = ["gen:openapi"]
run = [
   "go run -C src ./cmd/srat-openapi -out ../docs",
   "mise x npm:@redocly/cli@2.34.0 -- redocly lint ./docs/openapi.yaml"
]
sources = ["src/**/*.go"]
outputs = ["docs/openapi.yaml"]

[tasks."generate:haclients"]
alias = ["gen:haclients"]
dir = "src/homeassistant"
run = [
  "oapi-codegen -config cfg.yaml  -package core -o core/client.gen.go core.yaml",
  "oapi-codegen -config cfg.yaml  -package core_api -o core_api/client.gen.go core_api.yaml",
  "oapi-codegen -config cfg.yaml  -package hardware -o hardware/client.gen.go hardware.yaml",
  "oapi-codegen -config cfg.yaml  -package mount -o mount/client.gen.go mount.yaml",
  "oapi-codegen -config cfg.yaml  -package ingress -o ingress/client.gen.go ingress.yaml",
  "oapi-codegen -config cfg.yaml  -package host -o host/client.gen.go host.yaml",
  "oapi-codegen -config cfg.yaml  -package apps -o apps/client.gen.go apps.yaml",
  "oapi-codegen -config cfg.yaml  -package resolution -o resolution/client.gen.go resolution.yaml",
  "oapi-codegen -config cfg.yaml  -package root -o root/client.gen.go root.yaml",
  "oapi-codegen -config cfg.yaml  -package discovery -o discovery/client.gen.go discovery.yaml"
]
sources = [
  "*.yaml"
  ]
outputs = [
  "**/client.gen.go",
  ]

[tasks.generate]
alias = ["gen"]
run = "go generate -C src ./..."
depends_post = [
    { task = "generate:openapi" },
]
sources = [
  "src/**/*.go"
  ]
outputs = [
  "src/dbom/g/**/*.go",
  "src/dto/**/*_enums.go",
  ]

[tasks.golangci-lint]
run = "cd src && golangci-lint run --fix"

