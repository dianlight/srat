openapi: 3.0.0
info:
  title: API Supervisor Home Assistant - Core
  version: 2025.3.0
  description: Supervisor API for managing Home Assistant Core lifecycle.
  contact:
    email: lucio.tarantino@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
externalDocs:
  description: Find out more about HA Supervisor API
  url: https://developers.home-assistant.io/docs/api/supervisor/endpoints/#core
servers:
  - url: http://supervisor
tags:
  - name: core
    description: Core lifecycle management via Supervisor
paths:
  /core/info:
    get:
      tags:
        - core
      summary: Get information about Home Assistant Core.
      operationId: getCoreInfo
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Core information.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    enum: ["ok"]
                  data:
                    $ref: '#/components/schemas/CoreInfo'
  /core/restart:
    post:
      tags:
        - core
      summary: Restart Home Assistant Core.
      operationId: restartCore
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Core restarted successfully.
        '400':
          description: Bad request.
  /core/start:
    post:
      tags:
        - core
      summary: Start Home Assistant Core.
      operationId: startCore
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Core started successfully.
        '400':
          description: Bad request.
  /core/stop:
    post:
      tags:
        - core
      summary: Stop Home Assistant Core.
      operationId: stopCore
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Core stopped successfully.
        '400':
          description: Bad request.
  /core/rebuild:
    post:
      tags:
        - core
      summary: Rebuild Home Assistant Core container.
      operationId: rebuildCore
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Core rebuilt successfully.
        '400':
          description: Bad request.
  /core/update:
    post:
      tags:
        - core
      summary: Update Home Assistant Core.
      operationId: updateCore
      security:
        - bearerAuth: []
      requestBody:
        description: Update options.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoreUpdate'
      responses:
        '200':
          description: Core updated successfully.
        '400':
          description: Bad request.
  /core/logs:
    get:
      tags:
        - core
      summary: Get Core logs.
      operationId: getCoreLogs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Core logs.
          content:
            text/plain:
              schema:
                type: string
  /core/check:
    post:
      tags:
        - core
      summary: Check Core configuration.
      operationId: checkCoreConfig
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Core configuration is valid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    enum: ["ok"]
                  data:
                    $ref: '#/components/schemas/CoreCheck'
        '400':
          description: Core configuration is invalid.
  /core/options:
    post:
      tags:
        - core
      summary: Set Core options.
      operationId: setCoreOptions
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoreOptions'
      responses:
        '200':
          description: Options set successfully.
        '400':
          description: Bad request.
  /core/stats:
    get:
      tags:
        - core
      summary: Get Core container stats.
      operationId: getCoreStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Core stats.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
components:
  schemas:
    CoreInfo:
      type: object
      properties:
        version:
          type: string
          description: Installed Core version.
        version_latest:
          type: string
          description: Latest published version in the active channel.
        update_available:
          type: boolean
          description: True if an update is available.
        arch:
          type: string
          description: Host architecture (armhf, aarch64, i386, amd64).
        machine:
          type: string
          description: Machine type running the host.
        ip_address:
          type: string
          description: Docker internal IP address of the Core container.
        image:
          type: string
          description: Container image running the Core.
        boot:
          type: boolean
          description: True if set to start at boot.
        port:
          type: integer
          description: Port Home Assistant is running on.
        ssl:
          type: boolean
          description: True if Home Assistant uses SSL.
        watchdog:
          type: boolean
          description: True if watchdog is enabled.
        wait_boot:
          type: integer
          description: Maximum wait time during boot.
        audio_input:
          type: string
          description: Audio input device description.
        audio_output:
          type: string
          description: Audio output device description.
        backups_exclude_database:
          type: boolean
          description: Whether backups exclude the HA database file by default.
    CoreUpdate:
      type: object
      properties:
        version:
          type: string
          description: Version to update to.
    CoreCheck:
      type: object
      properties:
        result:
          type: string
          description: Configuration check result.
        errors:
          type: array
          items:
            type: string
          description: List of errors.
    CoreOptions:
      type: object
      properties:
        boot:
          type: boolean
          description: True if Core should start at boot.
        watchdog:
          type: boolean
          description: True if watchdog should be enabled.
        wait_boot:
          type: integer
          description: Maximum wait time during boot (seconds).
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
