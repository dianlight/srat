---
extends: default

ignore:
  - backend/src/vendor/
  - backend/src/homeassistant/
  - node_modules/
  - frontend/node_modules/
  - custom_components/.venv/
  - .vale/
  - .playwright-mcp/
  - frontend/.playwright-mcp/

rules:
  # GitHub Actions YAML often has long lines (action refs, expressions).
  line-length:
    max: 200
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  truthy:
    allowed-values: ["true", "false"]
    check-keys: false
  comments:
    min-spaces-from-content: 1
    require-starting-space: true
  document-start: disable
  indentation:
    spaces: 2
    indent-sequences: true
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 0
