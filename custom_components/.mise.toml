[deps.pip]
auto = true

[tools]


[env]
# Crea un venv nella cartella .venv e lo attiva automaticamente
_.python.venv = { path = ".venv", create = true }

[hooks]
# Ogni volta che entri nella cartella o il file cambia, esegue l'installazione
enter = "pip install -r requirements_dev.txt"

[tasks]
check = "mise run format-check && mise run lint && mise run typecheck && mise run test"
clean = "find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true && find . -type d -name .mypy_cache -exec rm -rf {} + 2>/dev/null || true && find . -type d -name .ruff_cache -exec rm -rf {} + 2>/dev/null || true && find . -type d -name .pytest_cache -exec rm -rf {} + 2>/dev/null || true"
fix = "ruff check --fix srat tests && ruff format srat tests"
format = "ruff format srat tests"
format-check = "ruff format --check srat tests"
#install-remote = "rsync -rvuzP --del ./srat ${HOMEASSISTANT_IP}:/config/custom_components"
lint = "ruff check srat tests"
#mount-remote = "umount -l /mnt/remote2 > /dev/null 2>&1 || : && mkdir -p /mnt/remote2 > /dev/null 2>&1 || : && sshfs -o reconnect,ServerAliveInterval=15,ServerAliveCountMax=3 ${HOMEASSISTANT_IP}:/config/custom_components /mnt/remote2"
test = "python -m pytest tests -v -c pyproject.toml"
typecheck = "mypy srat"

[tasks."package-hacs"]
usage = '''
flag "--output [output]" help="Output zip path" default="/tmp/build_artifacts/srat.zip"
flag "--version [version]" help="Version to inject into manifest.json (e.g. 2026.4.0)" default=""
'''
run = [
    "mkdir -p $(dirname \"${usage_output?}\")",
    '''
      set -e
      OUTPUT=$(cd "$(dirname "${usage_output?}")" && pwd)/$(basename "${usage_output?}")
      TMPDIR=$(mktemp -d)
      trap "rm -rf $TMPDIR" EXIT
      cp -r srat "$TMPDIR/"
      if [ -n "${usage_version:-}" ]; then
        python3 -c "
import json
path = '$TMPDIR/srat/manifest.json'
with open(path) as f:
    d = json.load(f)
d['version'] = '${usage_version}'
with open(path, 'w') as f:
    json.dump(d, f, indent=2)
print('Injected manifest version: ${usage_version}')
"
      fi
      (cd "$TMPDIR" && zip -qr "$OUTPUT" srat -x "srat/__pycache__/*" "srat/*.pyc")
    ''',
    "echo \"HACS component zip created at ${usage_output?}\"",
]
quiet = true

[tasks."install:remote"]
depends = [
    { task = "lint" },
    { task = "typecheck" },
    { task = "test" },
]
alias = "install-remote"
run = [
    "rsync -rvuzP --del ./srat ${HOMEASSISTANT_IP}:/config/custom_components",
    "ssh root@${HOMEASSISTANT_IP} -t 'ha core restart'",
    ]
quiet = true

[tasks."uninstall:remote"]
alias = "uninstall-remote"
run = [
    "ssh root@${HOMEASSISTANT_IP} -t 'rm -rf /config/custom_components/srat'",
    "ssh root@${HOMEASSISTANT_IP} -t 'ha core restart'",
]
quiet = true

[tasks."test:ci"]
alias = "test-ci"
run = "python -m pytest tests -v -c pyproject.toml --cov=srat --cov-report=xml:coverage.xml"

[tasks.prepare]
alias = "install-dev"
run = "pip install -r requirements_dev.txt"

[tasks.hassfest]
usage = '''
arg "<root_path>" help="Root project path" env="HOST_PROJECT_PATH"
'''
run = [
    'echo Running hassfest against ${usage_root_path?}/custom_components ...',
    'docker run --rm -v ${usage_root_path?}/custom_components://github/workspace ghcr.io/home-assistant/hassfest --core-path=/github/workspace --integration-path=/github/workspace/srat' 
]
quiet = true