name: opencode-triage

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: opencode-triage-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  triage:
    if: |
      (
        github.event_name != 'pull_request_review' &&
        github.event.comment.user.login != 'github-actions[bot]' &&
        github.event.comment.user.login != 'opencode-agent[bot]' &&
        github.event.comment.user.login != 'coderabbitai[bot]' &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
        (github.event.issue.state == 'open' || github.event.pull_request.state == 'open') &&
        (
          contains(github.event.comment.body, ' /oc') ||
          startsWith(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, ' /opencode') ||
          startsWith(github.event.comment.body, '/opencode') ||
          contains(github.event.issue.labels.*.name, 'opencode:awaiting-response') ||
          contains(github.event.pull_request.labels.*.name, 'opencode:awaiting-response')
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        github.event.review.user.login != 'github-actions[bot]' &&
        github.event.review.user.login != 'opencode-agent[bot]' &&
        github.event.review.user.login != 'coderabbitai[bot]' &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association) &&
        (github.event.issue.state == 'open' || github.event.pull_request.state == 'open') &&
        (
          contains(github.event.review.body, ' /oc') ||
          startsWith(github.event.review.body, '/oc') ||
          contains(github.event.review.body, ' /opencode') ||
          startsWith(github.event.review.body, '/opencode') ||
          contains(github.event.pull_request.labels.*.name, 'opencode:awaiting-response')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run opencode (analysis & proposal only)
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a # latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_TRIGGER_BODY: ${{ github.event.review.body || github.event.comment.body || github.event.issue.body }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
          prompt: |
            You are a triage and technical-design assistant with **read-only access**.
            You can use `gh` to read issues/PRs, search the repo, and post comments.
            You CANNOT commit, push, or modify any file.

            ## Context
            - Repository: ${{ github.repository }}
            - Event: ${{ github.event_name }}
            - Issue/PR: ${{ github.event.issue.number || github.event.pull_request.number }}
            - Trigger text is in env var `OPENCODE_TRIGGER_BODY`. If empty (e.g. a
              review with no body), rely on the `opencode:awaiting-response` label
              state and the review verdict instead.

            ## Labels you manage
            - `opencode:awaiting-response` — you're waiting on a human.
            - `opencode:approved-for-implementation` — human approved; a separate
              workflow will implement.
            Create them if missing: `gh label create "..." 2>/dev/null || true`

            ## Language
            Default to the language of the issue/PR title or first substantive
            comment. If you can't use that language reliably, use English.

            ## Workflow
            Do these steps in order:

            ### 1. Understand the context
            Read the full issue/PR: title, description, labels, comments, reviews,
            linked commits/files, and (for PRs) the diff. Note anything missing or
            ambiguous.

            ### 2. Analyze
            Search for related issues/PRs (`gh issue list`, `gh pr list`,
            `gh search issues`). Do a concise root-cause or feasibility analysis
            grounded in real code. Flag risks.

            ### 3. Decide: enough info to propose a solution?
            - **No** → Post a comment with your specific open questions (one
              sentence each, explain why the answer matters). Set
              `opencode:awaiting-response`, remove
              `opencode:approved-for-implementation` if present, and STOP.
            - **Yes** → Post a structured proposal comment:
                1. **Summary** — one or two sentences.
                2. **Related issues/PRs** — links and how each relates.
                3. **Root cause / analysis** — with file paths.
                4. **Proposed solution** — implementation plan, files to change,
                   code sketches (not a full diff), edge cases, tests, config/docs
                   changes.
                5. **Risks / tradeoffs**.
                6. Ask for explicit approval (e.g. "Reply 'approved' or submit an
                   Approve review if you want this implemented.")
              Set `opencode:awaiting-response`, remove
              `opencode:approved-for-implementation`, and STOP.

            ### 4. Check for approval (only if this run was triggered by
               `opencode:awaiting-response` being present)
            Look at human input since your last comment. Approval is an explicit
            comment ("approved", "go ahead", "LGTM") or a PR review with verdict
            "Approve" whose body doesn't contradict it. "Request changes" or
            ambiguous replies are not approval — treat as feedback and go back to
            step 3 to update your proposal.

            If approved:
            - Post a short acknowledgment.
            - Add `opencode:approved-for-implementation`, remove
              `opencode:awaiting-response`.
            - STOP.

            If declined or closed:
            - Remove `opencode:awaiting-response`, do not add
              `opencode:approved-for-implementation`, and STOP.

            ## Hard constraints
            - Never implement anything. Implementation is handled by a separate
              workflow.
            - Never repeat an unanswered clarification question — wait, or follow
              up only if significant new information appears.
            - Keep comments well-formatted Markdown.
            - Follow existing code patterns in your proposals; prefer simple
              solutions.
