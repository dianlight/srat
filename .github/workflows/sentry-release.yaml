name: Sentry Create Release Tag

on:
  release:
    types: [published]

jobs:
  set-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.setenv.outputs.environment }}
    steps:
      - name: Set environment variable based on version
        id: setenv
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [[ "$VERSION" == *"-dev."* ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" == *"-rc."* ]]; then
            echo "environment=prerelease" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
          fi
  create-sentry-release:
    name: Sentry Release Tracking
    runs-on: ubuntu-latest
    needs: set-environment
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Create Sentry release
        if: env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT != ''
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3
        id: sentry_release
        with:
          environment: ${{ needs.set-environment.outputs.environment }}
          release: ${{ github.event.release.tag_name || github.sha }}
