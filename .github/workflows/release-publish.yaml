name: Release Publish

on:
  release:
    types: [published]
  workflow_dispatch: # Support manual run

permissions:
  contents: write
  pull-requests: write

jobs:
  process-release:
    runs-on: ubuntu-latest
    # Don't run this on pre-releases automatically, only on full releases
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AUTH_APP_ID }}
          private-key: ${{ secrets.AUTH_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }} 

      - name: Process Release and Update Changelog
        id: process_work
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const fs = require('fs');
            let tagName, releaseId;

            // Handle manual run vs automated release trigger
            if (context.eventName === 'workflow_dispatch') {
              console.log('Manual trigger detected. Fetching latest release...');
              const { data: latestRelease } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              tagName = latestRelease.tag_name;
              releaseId = latestRelease.id;
              console.log(`Using latest release: ${tagName} (ID: ${releaseId})`);
            } else {
              tagName = context.payload.release.tag_name;
              releaseId = context.payload.release.id;
            }

            core.exportVariable('TARGET_TAG_NAME', tagName);

            // 1. Verify Assets
            console.log(`Checking release assets for ${tagName}...`);
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            if (assets.length < 2) {
              core.setFailed(`Expected at least 2 assets, found ${assets.length}`);
              return;
            }
            console.log(`✓ Found ${assets.length} assets.`);

            // 2. Update CHANGELOG.md
            if (!fs.existsSync('CHANGELOG.md')) {
              console.log('CHANGELOG.md not found, skipping updates.');
              return;
            }

            let changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const unreleasedHeader = /## \[ 🚧 Unreleased \]/;
            
            // Check if this version header already exists to prevent double-processing in manual runs
            const versionHeader = `## ${tagName}`;
            if (changelog.includes(versionHeader)) {
               console.log(`Changelog already contains ${versionHeader}. Skipping file update.`);
               return;
            }

            if (unreleasedHeader.test(changelog)) {
              changelog = changelog.replace(unreleasedHeader, versionHeader);
              
              // 3. Prepend new Unreleased section
              const newSection = [
                '',
                '## [ 🚧 Unreleased ]',
                '',
                '### ✨ Features',
                '',
                '### 🐛 Bug Fixes',
                '',
                '### 🏗 Chore',
                '',
                ''
              ].join('\n');

              const lines = changelog.split('\n');
              let insertIndex = lines.findIndex(l => l.startsWith('## ')) || 0;
              if (insertIndex < 0) insertIndex = 0;
              
              lines.splice(insertIndex, 0, newSection);
              fs.writeFileSync('CHANGELOG.md', lines.join('\n'));
              
              core.setOutput('updated', 'true');
              console.log('CHANGELOG.md updated and new section prepared.');
            } else {
              console.log('Unreleased section not found in CHANGELOG.md');
            }

      - name: Commit and Push to Branch
        if: steps.process_work.outputs.updated == 'true'
        id: commit_step
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH_NAME="chore/changelog-update-${TARGET_TAG_NAME}"
          git checkout -b "$BRANCH_NAME"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG.md for release $TARGET_TAG_NAME"
          git push origin "$BRANCH_NAME" --force
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Create and Merge Pull Request
        if: steps.process_work.outputs.updated == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const branchName = '${{ steps.commit_step.outputs.BRANCH_NAME }}';
            const tagName = process.env.TARGET_TAG_NAME;
            const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            console.log(`Waiting for branch ${branchName} to be indexed...`);
            await delay(3000); // 3 second delay to prevent "Resource not accessible" on PR creation

            console.log(`Creating Pull Request for ${branchName}`);
            
            let pr;
            try {
              const response = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `chore: update CHANGELOG for ${tagName}`,
                head: branchName,
                base: 'main',
                body: `Automated CHANGELOG update for release ${tagName}.`,
              });
              pr = response.data;
              console.log(`PR created: ${pr.html_url}`);
            } catch (err) {
              core.setFailed(`Failed to create PR: ${err.message}. Ensure the GitHub App has "Pull Requests: Write" permissions.`);
              return;
            }

            // Retry logic for merging (exponential backoff)
            const maxRetries = 5;

            for (let i = 0; i < maxRetries; i++) {
              try {
                console.log(`Attempt ${i + 1} to merge PR #${pr.number}...`);
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash'
                });
                console.log('PR merged successfully.');
                
                // Clean up branch
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branchName}`
                });
                return;
              } catch (error) {
                console.error(`Attempt ${i + 1} failed: ${error.message}`);
                if (i === maxRetries - 1) {
                  core.setFailed('Could not complete PR merge after multiple attempts. Manual intervention may be required.');
                } else {
                  const waitTime = Math.pow(2, i) * 2000;
                  console.log(`Retrying in ${waitTime}ms...`);
                  await delay(waitTime);
                }
              }
            }

      - name: Move release tag to Merge Commit
        if: steps.process_work.outputs.updated == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const tagName = process.env.TARGET_TAG_NAME;
            
            // Fetch the latest commit on main (the merge commit)
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main'
            });
            
            const commitSha = ref.object.sha;

            console.log(`Moving tag ${tagName} to merge commit ${commitSha}`);

            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
                sha: commitSha,
                force: true
              });
              console.log(`✓ Tag ${tagName} successfully moved.`);
            } catch (error) {
              core.setFailed(`Failed to move tag: ${error.message}`);
            }