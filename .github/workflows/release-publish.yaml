name: Release Publish

on:
  workflow_run:
    workflows: ["build"]
    types:
      - completed

permissions:
  contents: write

jobs:
  publish:
    name: Publish release
    # Only run when build.yaml succeeded on main with a release commit
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at triggering commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Check if this is a release commit
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --format=%s HEAD)
          if [[ "$COMMIT_MSG" =~ ^chore\(release\):\ (.+)$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "Release commit detected: $COMMIT_MSG"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Not a release commit: $COMMIT_MSG — skipping."
          fi

      - name: Publish draft release
        if: steps.check.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail

          echo "Looking for draft release with tag $VERSION..."
          DRAFT_ID=$(gh api repos/:owner/:repo/releases \
            --jq ".[] | select(.draft == true and .tag_name == \"$VERSION\") | .id" \
            | head -n 1)

          if [[ -z "$DRAFT_ID" ]]; then
            echo "::warning::No draft release found for tag $VERSION — skipping publish."
            exit 0
          fi

          echo "Found draft release ID: $DRAFT_ID"

          # Publish with retries (GitHub API can be flaky)
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            if gh api -X PATCH "repos/:owner/:repo/releases/$DRAFT_ID" \
                -F draft=false -F prerelease=false >/dev/null 2>&1; then
              echo "✅ Release $VERSION published successfully!"
              echo "### Release published" >> "$GITHUB_STEP_SUMMARY"
              echo "- Version: **$VERSION**" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES failed, retrying in 5s..."
            sleep 5
          done

          echo "::error::Failed to publish release $VERSION after $MAX_RETRIES attempts"
          exit 1

      - name: Reset CHANGELOG for next cycle
        if: steps.check.outputs.is_release == 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail

          ESCAPED_VERSION="${VERSION//./\\.}"
          TEMP_CHANGELOG="CHANGELOG.md.tmp"
          THANKS_FILE=$(mktemp)
          UNRELEASED_FILE=$(mktemp)

          # Step A: Extract Thanks/Notes sections from the released version
          # (to migrate to the new Unreleased section).
          awk "
            /^## $ESCAPED_VERSION/{ in_ver=1; next }
            in_ver && /^## /{ exit }
            in_ver && /^### .*(Thanks|Notes)/{ in_sec=1; print; next }
            in_ver && in_sec && /^### /{ in_sec=0 }
            in_ver && in_sec{ print }
          " CHANGELOG.md >"$THANKS_FILE"

          # Step B: Build the Unreleased section header
          {
            cat <<'UNRELEASED'
          ## [ 🚧 Unreleased ]

          ### ✨ Features

          ### 🐛 Bug Fixes

          ### 🏗 Chore

          UNRELEASED
            [[ -s "$THANKS_FILE" ]] && cat "$THANKS_FILE"
          } >"$UNRELEASED_FILE"

          # Step C: Rebuild CHANGELOG in a single awk pass
          awk -v nv="$VERSION" -v uf="$UNRELEASED_FILE" '
          BEGIN { hdr=1; tver=0; skip=0 }

          # File-header phase: print lines until first ## version header
          hdr {
              if (/^## /) {
                  hdr = 0
                  while ((getline line < uf) > 0) print line
                  close(uf)
              } else {
                  print; next
              }
          }

          # Entering the just-released version block
          /^## / && index($0, nv) > 0 { tver=1; skip=0; print; next }

          # Inside the just-released version: skip Thanks/Notes
          tver && /^### / {
              if (/Thanks|Notes/) { skip=1; next }
              skip=0; print; next
          }

          # Leaving the just-released version
          tver && /^## / && index($0, nv) == 0 { tver=0; skip=0 }

          # Default
          !skip { print }
          ' CHANGELOG.md >"$TEMP_CHANGELOG"

          rm -f "$THANKS_FILE" "$UNRELEASED_FILE"
          mv "$TEMP_CHANGELOG" CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "chore(release): reset changelog for next development cycle"
          git push origin main

          echo "### CHANGELOG reset" >> "$GITHUB_STEP_SUMMARY"
          echo "CHANGELOG.md reset for next development cycle." >> "$GITHUB_STEP_SUMMARY"
