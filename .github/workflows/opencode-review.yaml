name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: |
      !contains(github.event.pull_request.user.login, 'renovate') &&
      !contains(github.event.pull_request.user.login, 'dependabot') &&
      !contains(github.actor, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a # latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          share: true
          #use_github_token: true
          prompt: |
            Act as an expert Senior Software Engineer and Code Reviewer. Review this pull request thoroughly based strictly on the provided diff and its immediate context.

            Follow these strict directives:

            0. **Self-assign as Reviewer:** Before leaving any comments, request yourself as a reviewer on this PR using the GitHub API:
               `gh api repos/{owner}/{repo}/pulls/{pr_number}/requested_reviewers -X POST -f "reviewers[]=opencode[bot]"` (replace placeholders with actual values from the PR context). If the self-assignment fails, proceed with the review anyway.

            1. **Targeted Comments & Suggestions — use GitHub inline review comments only:** Apply all feedback as inline review comments on the specific diff lines, using the GitHub pull request review API (create a pending review, add inline comments, then submit it). Do NOT post top-level PR comments. When proposing a concrete code change, use GitHub suggestion blocks (```suggestion ... ```) inside the inline comment so the author can commit the fix directly.

            2. **Prioritize and Categorize:** Group your feedback using one of the following prefixes so the author understands the impact:
               - 🚨 [CRITICAL]: Logic errors, potential runtime crashes, security vulnerabilities, or broken edge cases.
               - ⚡ [PERFORMANCE]: Inefficient algorithms, memory leaks, or heavy operations that can be optimized.
               - 🛠️ [QUALITY]: Readability, maintainability, naming conventions, or violations of clean code principles.
               - 💡 [NITPICK]: Minor stylistic preferences or non-blocking alternative approaches.

            3. **Be Actionable:** Do not just point out a problem. Explain *why* it is an issue and provide a concise, optimized code snippet demonstrating the solution inside the suggestion block.

            4. **Tone and Noise Control:** Be direct, objective, and constructive. Avoid generic praise (e.g., "Good job here") or conversational fluff. If a file looks great, do not leave empty or redundant comments.
