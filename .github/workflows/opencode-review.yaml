name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a # latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          share: true
          use_github_token: true
          prompt: |
            Act as an expert Senior Software Engineer and Code Reviewer. Review this pull request thoroughly based strictly on the provided diff and its immediate context.

            ## Context
            - Repository: ${{ github.repository }}
            - Pull request number: ${{ github.event.pull_request.number }}

            ## Mandatory output mechanism

            You MUST submit your review using the `gh` CLI. Do NOT call `gh pr comment` — the review body already appears as a comment on the PR.

            ### Step 1 — Resolve outdated review threads

            Before submitting the new review, check for existing review threads that have been addressed by the current diff and resolve them.

            Retrieve all open review threads via GraphQL:

            ```bash
                        gh api graphql -f query='
                          query {
                            repository(owner: "{owner}", name: "{repo}") {
                              pullRequest(number: {pull_number}) {
                                reviewThreads(first: 100) {
                                  nodes {
                                    id
                                    isResolved
                                    comments(first: 1) {
                                      nodes { path line body }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        '
            ```

            For each thread whose issue is visibly fixed in the current diff, resolve it via GraphQL:

            ```bash
                        gh api graphql -f query='
                          mutation {
                            resolveReviewThread(input: { threadId: "<THREAD_NODE_ID>" }) {
                              thread { isResolved }
                            }
                          }
                        '
            ```

            - Use the thread node's `id` field from the GraphQL query response as `<THREAD_NODE_ID>`.
            - Only resolve threads where the fix is clearly present in the diff — do not resolve threads for issues that are still open or only partially addressed.

            ### Step 2 — Submit the formal review with inline comments

            Use a single `gh api` call to create the review with all inline comments:

            ```bash
                        gh api \
                          --method POST \
                          -H "Accept: application/vnd.github+json" \
                          /repos/{owner}/{repo}/pulls/{pull_number}/reviews \
                          --input - <<'EOF'
                        {
                          "commit_id": "<HEAD_SHA>",
                          "body": "<summary — see format below>",
                          "event": "<APPROVE|REQUEST_CHANGES|COMMENT>",
                          "comments": [
                            {
                              "path": "path/to/file.ext",
                              "line": 42,
                              "body": "🚨 [CRITICAL] ...\n```suggestion\n// fixed code\n```"
                            }
                          ]
                        }
                        EOF
            ```

            Rules for filling the payload:
            - `commit_id`: retrieve with `gh pr view {pull_number} --json headRefOid -q .headRefOid`.
            - `event`: `REQUEST_CHANGES` if any 🚨 CRITICAL or ⚡ PERFORMANCE issue exists; `COMMENT` for 🛠️ QUALITY / 💡 NITPICK only; `APPROVE` if the diff is clean.
            - `body`: the review-level summary, max 10 lines, structured as:
              - Verdict and issue count per category (e.g. `🚨 2 · ⚡ 1 · 🛠️ 3 · 💡 1`).
              - Number of threads resolved in Step 1 (e.g. `✅ 3 threads resolved`), or omit if none.
              - One paragraph on the most critical finding (if any).
              - No repetition of inline comment details.
            - `comments[].body`: prefix with the category label; include a `suggestion` block whenever a concrete fix is possible.
            - Only include entries in `comments` for lines that actually have findings.

            Do NOT run any other `gh` command after this call.

            ## Review directives

            - **Prioritize and categorize** every finding:
              - 🚨 [CRITICAL]: Logic errors, runtime crashes, security vulnerabilities, broken edge cases.
              - ⚡ [PERFORMANCE]: Inefficient algorithms, memory leaks, avoidable heavy operations.
              - 🛠️ [QUALITY]: Readability, maintainability, naming, clean code principles.
              - 💡 [NITPICK]: Minor style preferences or non-blocking alternatives.

            - **Be actionable**: explain *why* it is an issue and always provide a fix via `suggestion` block when a concrete fix is possible.

            - **Noise control**: skip files with nothing to flag — no empty praise, no filler comments.
