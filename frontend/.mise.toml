[deps.bun]
auto = true

[tools]
#"go:github.com/playwright-community/playwright-go/cmd/playwright" = "latest"
"npm:@rtk-query/codegen-openapi" = "2.2.0"

[hooks]
enter = "mise run deps"

[tasks]
clean = "rm -rf out"
dev = "mise run ensure-dev-port && tsgo --noEmit && NODE_ENV=development bun --hot run bun.build.ts -w -s ./out"
gowatch = "bun run gowatch"
watch = "bun run watch"

prepare = "bun install"

[tasks."ensure-dev-port"]
run = '''
if command -v lsof >/dev/null 2>&1 && lsof -nPiTCP:3080 -sTCP:LISTEN >/dev/null 2>&1; then
  stale_pid=$(lsof -t -nPiTCP:3080 -sTCP:LISTEN 2>/dev/null | head -n1)
  if [ -n "${stale_pid:-}" ]; then
    stale_cmd=$(ps -p "$stale_pid" -o args= 2>/dev/null || true)
    if printf "%s" "$stale_cmd" | grep -E "python(3)? -m http\.server( |$).*3080" >/dev/null 2>&1; then
      echo "Port 3080 is occupied by stale local static server (pid=$stale_pid), stopping it..."
      kill "$stale_pid"
    else
      echo "Port 3080 is already in use by another process: ${stale_cmd:-unknown}"
      echo "Please stop that process or use a different frontend port."
      exit 1
    fi
  fi
fi
'''
quiet = true

[tasks.validate-macros]
run = "bun ../scripts/validate-macro-imports.js"
quiet = true

[tasks."build:static"]
usage = '''
arg "<dir>" help="Target Directory to build" default="src/web/static"
flag "--version <version>" help="Build version"
'''
alias = ["build-static"]
run = [
  "echo Building Frontend version ${usage_version?} in directory ${usage_dir:?}",
  "rm -rf ../backend/${usage_dir:?}/* || :",
  "mkdir -p ../backend/${usage_dir:?} || :",
  "touch ../backend/${usage_dir:?}/.keep",
  "mise run version ${usage_version?}",
  "mise run build ../backend/${usage_dir:?} --version ${usage_version?}",
]
#sources = [
#  "src/**/*",
#]
hide = true
quiet = true

[tasks.build]
usage = '''
arg "<dir>" help="Target Directory to build"
flag "--version <version>" help="Build version" env="VERSION"
'''
depends = [
  { task = "lint" },
]
env = { NODE_ENV = "production",API_URL = "", VERSION = "" }
run = [
  "tsgo --project tsconfig.prod.json --noEmit ",
  "bun run bun.build.ts -o ${usage_dir?} -v ${usage_version?}",
]
quiet = true

[tasks.generate]
alias = ["gen", "gen:openapi", "gen:types"]
run = ["rtk-query-codegen-openapi api.config.js", "tsgo --noEmit"]
sources = [
  "api.config.js",
  "../backend/docs/openapi.json",
]
outputs = [
  "./src/store/sratApi.ts",
]

[tasks."dev:remote"]
usage = '''
arg "<url>" help="API URL" env="API_URL"
'''
env = { NODE_ENV = "remote" }
depends = [
  { task = "ensure-dev-port" },
  { task = "generate" },
]
run = [
  "tsgo --noEmit",
  "bun --hot run bun.build.ts -w -s ./out -a ${usage_url?}",
]
quiet = true

[tasks."debug:remote"]
usage = '''
arg "<url>" help="API URL" env="API_URL"
'''
env = { NODE_ENV = "remote" }
depends = [
  { task = "ensure-dev-port" },
  { task = "generate" },
]
run = [
  "tsgo --noEmit",
  "copilot-debug bun --hot run bun.build.ts -w -s ./out -a ${usage_url?}",
]
quiet = true

[tasks.update]
run = [
  "bun upgrade --latest",
  "bun update -i",
  { task = "test" },
]

[tasks.lint]
depends = [
  { task = "validate-macros" },
]
run = [
  "biome check --no-errors-on-unmatched --write"
]
quiet = true

[tasks.test]
env = { API_URL = "http://localhost:3000" }
run = [
  "tsgo --noEmit",
  "AGENT=1 bunx vitest run --reporter=verbose",
]
quiet = true

[tasks."test:new"]
env = { API_URL = "http://localhost:3000" }
run = [
  "tsgo --noEmit",
  "AGENT=1 bunx vitest run --reporter=verbose --changed",
]
quiet = true

[tasks."test:browser"]
tools."npm:playwright" = "latest"
usage = '''
flag "--ui" negate="--no-ui" default=#false help="Run tests in interactive UI mode" negatable
arg "[files]" var=#true double_dash="optional" help="Specific test files or test name patterns to run (optional)"
'''
env = { API_URL = "http://localhost:3000" }
run = [
  "bunx playwright install --with-deps --only-shell chromium",
  "tsgo --noEmit",
  "AGENT=1 bunx vitest run --config=vitest.browser.config.ts ${usage_ui:+--browser.headless=false} ${usage_files}",
]
quiet = true

[tasks."test:ci"]
env = {
  API_URL = false,
  GITHUB_ACTIONS = true,
  }
run = [
  "tsgo --noEmit",
  "bunx vitest run --coverage --bail=1 --reporter=dot --dangerouslyIgnoreUnhandledErrors --reporter=github-actions",
]
quiet = true

[tasks.version]
usage = '''
arg "[version]" help="Build version"
'''
run = 'bun run version.ts ${usage_version:+-o ${usage_version?}}'
quiet = true
hide = true

[tasks.format]
alias = ["fmt"]
run = "biome check --write"
quiet = true