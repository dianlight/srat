[deps.bun]
auto = true

[tools]
"npm:@rtk-query/codegen-openapi" = "2.2.0"

[hooks]
enter = "mise run deps"

[tasks]
clean = "rm -rf out"
dev = "tsgo --noEmit && NODE_ENV=development bun --hot run bun.build.ts -w -s ./out"
gowatch = "bun run gowatch"
watch = "bun run watch"

prepare = "bun install"

[tasks.validate-macros]
run = "bun ../scripts/validate-macro-imports.js"
quiet = true

[tasks."build:static"]
usage = '''
arg "<dir>" help="Target Directory to build" default="src/web/static"
flag "--version <version>" help="Build version"
'''
alias = ["build-static"]
run = [
  "echo Building Frontend version ${usage_version?} in directory ${usage_dir:?}",
  "rm -rf ../backend/${usage_dir:?}/* || :",
  "mkdir -p ../backend/${usage_dir:?} || :",
  "touch ../backend/${usage_dir:?}/.keep",
  "mise run version ${usage_version?}",
  "mise run build ../backend/${usage_dir:?} --version ${usage_version?}",
]
#sources = [
#  "src/**/*",
#]
hide = true
quiet = true

[tasks.build]
usage = '''
arg "<dir>" help="Target Directory to build"
flag "--version <version>" help="Build version" env="VERSION"
'''
depends = [
  { task = "lint" },
]
env = { NODE_ENV = "production",API_URL = "", VERSION = "" }
run = [
  "tsgo --project tsconfig.prod.json --noEmit ",
  "bun run bun.build.ts -o ${usage_dir?} -v ${usage_version?}",
]
quiet = true

[tasks.generate]
alias = ["gen", "gen:openapi", "gen:types"]
run = ["rtk-query-codegen-openapi api.config.js", "tsgo --noEmit"]
sources = [
  "api.config.js",
  "../backend/docs/openapi.json",
]
outputs = [
  "./src/store/sratApi.ts",
]

[tasks."dev:remote"]
usage = '''
arg "<url>" help="API URL" env="API_URL"
'''
env = { NODE_ENV = "remote" }
depends = [
  { task = "generate" },
]
run = [
  "tsgo --noEmit",
  "bun --hot run bun.build.ts -w -s ./out -a ${usage_url?}",
]
quiet = true

[tasks."debug:remote"]
usage = '''
arg "<url>" help="API URL" env="API_URL"
'''
env = { NODE_ENV = "remote" }
depends = [
  { task = "generate" },
]
run = [
  "tsgo --noEmit",
  "copilot-debug bun --hot run bun.build.ts -w -s ./out -a ${usage_url?}",
]
quiet = true

[tasks.update]
run = [
  "bun upgrade --latest",
  "bun update -i",
  { task = "test" },
]

[tasks.lint]
depends = [
  { task = "validate-macros" },
]
run = [
  "biome check --no-errors-on-unmatched --write"
]
quiet = true

[tasks.test]
env = { API_URL = "http://localhost:3000" }
run = [
  "bun ./scripts/add-test-setup.js",
  "tsgo --noEmit",
  "AGENT=1 BUN_TEST_NO_COVERAGE_THRESHOLD=1 bun test --preload ./test/setup.ts --bail --timeout 10000 --max-concurrency=1 --reporter=dot",
]
quiet = true

[tasks."test:new"]
env = { API_URL = "http://localhost:3000" }
run = [
  "bun ./scripts/add-test-setup.js",
  "tsgo --noEmit",
  "AGENT=1 BUN_TEST_NO_COVERAGE_THRESHOLD=1 bun test --preload ./test/setup.ts --bail --timeout 10000 --max-concurrency=1 --changed --reporter=dot",
]
quiet = true

[tasks."test:ci"]
env = { API_URL = "http://localhost:3000" }
run = [
  "bun ./scripts/add-test-setup.js",
  "bun test --preload ./test/setup.ts --only-failures --timeout 60000 --bail --max-concurrency=1 --coverage",
]
quiet = true

[tasks.version]
usage = '''
arg "[version]" help="Build version"
'''
run = 'bun run version.ts ${usage_version:+-o ${usage_version?}}'
quiet = true
hide = true