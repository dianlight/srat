[test]
# bail: stop after N failures. Set to 0 to disable (show all failures).
# In CI, override with --bail to fail fast.
bail = 0
# Coverage is disabled by default for speed (~12s overhead).
# Enable in CI with: bun test --coverage
# or run: mise run //frontend:test:ci
coverageReporter = ["text", "lcov"]
#coverage = false
coveragePathIgnorePatterns = [
  "**/node_modules/**",
  "**/dist/**",
  "**/build/**",
  "**/coverage/**",
  "**/mocks/**",
  "**/macro/**",
  "**/.devcontainer/**",
  "src/store/sratApi.ts",
  "test/**",
]
coverageSkipTestFiles = true # Skip coverage for test files
preload = "./test/setup.ts"
# smol=true increases GC pressure and is slower in practice — disabled.
timeout = 10000
