monorepo_root = true

[monorepo]
config_roots = ["frontend", "backend", "custom_components"]

[settings]
npm.package_manager = "bun"
# npm.bun = true
env_shell_expand = true
# libc = "musl"

[settings.python]
compile = false

[tools]
go = "1.26.5"
act = "0.2.89"
vale = "3.15.1"
markdownlint-cli2 = "0.23.0"
prettier = "3.9.4"
"npm:doctoc" = "2.5.0"
bun = "1.3.14"
jq = "1.8.2"
pkl = "0.32.0"
biome = "2.4.15"
taplo = "0.10.0"
golangci-lint = "2.12.2"
ruff = "0.15.20"
python = "3.14.6"
"conda:mypy" = { version = "1.19.1" }
shellcheck = "0.11.0"
shfmt = "3.13.1"
"go:golang.org/x/tools/gopls" = "latest"
gh = "latest"
hk = "1.50.0"
yamllint = "latest"
# opencode = "latest"
# copilot-cli = "latest"

[env]
HK_MISE = 1
_.source = [
  { path = "scripts/env.sh", tools = true },
  { path = "scripts/setup-windows-proxy.sh", tools = true },
]

[hooks]
# Pre-cache the hk PKL package (best-effort) then wire the git hook.
# setup-pkl-proxy.sh must never fail postinstall, hence `|| true`.
postinstall = "./scripts/setup-pkl-proxy.sh || true; hk install --mise"

[tasks]
docs = "mise run docs-toc && mise run docs-fix && mise run docs-validate"
docs-toc = "./scripts/docs-ignore.sh list-md-files toc | xargs -r bunx doctoc --github"
docs-validate = "./scripts/validate-docs.sh"
docs-fix = "./scripts/validate-docs.sh --fix"
brand-images = "python3 scripts/generate-brand-images.py"
clean-local-branches = "scripts/cleanup-old-local-branches.sh"
clean-local-branches-dry = "scripts/cleanup-old-local-branches.sh --dry"
clean-local-tags = "scripts/cleanup-old-local-tags.sh"
clean-local-tags-dry = "scripts/cleanup-old-local-tags.sh --dry"

[tasks.setup-pkl-proxy]
description = "Pre-cache the hk PKL package so `hk install --mise` works behind a corporate proxy."
run = "./scripts/setup-pkl-proxy.sh"

[tasks.pre-commit]
run = "hk run pre-commit"
quiet = true

[tasks.test]
run = [
  { tasks = [
    "//backend:test",
    "//frontend:test",
    "//custom_components:test",
  ] },
]
quiet = true

[tasks.all]
alias = ["build:all", "build:release"]
usage = '''
flag "--version <version>" help="Build version"
'''
run = """
   echo "Running full build with version: ${usage_version:-not provided}"
  mise run //backend:build:all --version={{usage.version}} --sentry_dsn=${SENTRY_DSN:-disabled}
  """
quiet = true

[tasks.release]
description = "Trigger the release workflow on GitHub. Optionally accepts a version flag."
usage = '''
flag "--version <version>" help="Release version"
'''
run = 'gh workflow run release.yaml --ref main ${usage_version:+-f version=${usage_version?}}'
quiet = true
