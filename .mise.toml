docs = "mise run docs-fix && mise run docs-toc && mise run docs-validate"
docs-toc = "find . -name '*.md' -not -path './node_modules/*' -not -path './frontend/node_modules/*' -not -path './backend/src/vendor/*' -not -path './.vale/*' -not -path './.github/*' -not -path './docs/tasks/*' | xargs bunx doctoc --github"
docs-validate = "./scripts/validate-docs.sh"
docs-fix = "./scripts/validate-docs.sh --fix && bunx markdownlint-cli2 '**/*.md' '#frontend/node_modules' '#backend/src/vendor' '#.vale' '#.github' '#docs/tasks' --fix"
#docs-check = "bash -c 'NODE_RUNTIME=; PACKAGE_MANAGER=; if command -v node >/dev/null 2>&1; then NODE_RUNTIME=node; elif command -v bun >/dev/null 2>&1; then NODE_RUNTIME=bun; fi; if command -v bun >/dev/null 2>&1; then PACKAGE_MANAGER=bun; elif command -v npm >/dev/null 2>&1; then PACKAGE_MANAGER=npm; fi; if command -v prek >/dev/null 2>&1; then echo \"✅ prek found\"; else echo \"⚠️  prek not found (optional for git hooks)\"; fi; if command -v lychee >/dev/null 2>&1; then echo \"✅ Lychee found (link checker)\"; else echo \"⚠️  Lychee not found (optional but recommended)\"; fi; if command -v vale >/dev/null 2>&1; then echo \"✅ Vale found (prose linter)\"; else echo \"⚠️  Vale not found (optional but recommended)\"; fi; echo \"✅ Documentation validation dependencies check complete\"; echo \"JavaScript runtime: $NODE_RUNTIME, Package manager: $PACKAGE_MANAGER\"'"
#docs-help = "cat docs/DOCUMENTATION_GUIDELINES.md"
#docs-install = "bun add -g markdownlint-cli2 prettier doctoc"
#clean = "mise run frontend:clean && mise run backend:clean"
#gemini = "bun --bun $(which gemini)"
#check = "mise run docs-check && mise run security && prek run --files $(find . -name '*.md' | grep -v 'node_modules')"
#security = "mise run backend:security"
clean-local-branches = "scripts/cleanup-old-local-branches.sh"
clean-local-branches-dry = "scripts/cleanup-old-local-branches.sh --dry"
clean-local-tags = "scripts/cleanup-old-local-tags.sh"
clean-local-tags-dry = "scripts/cleanup-old-local-tags.sh --dry"

[tasks.version]
usage = '''
flag "--version [version]" help="Build version" env="VERSION" 
'''
run = """
  if [ -n "${usage_version}" ]; then
    echo "Using provided version: ${usage_version?}"
    echo "VERSION=${usage_version?}" > /tmp/.env.tmp
  else
    echo "No version provided, running next_version.sh to determine the next version..."
    scripts/next_version.sh
  fi
"""
depends_post = [
    { task = "rollbar_env"},
]
quiet = true

[tasks.rollbar_env]
usage = '''
flag "--version [version]" help="Build version" env="VERSION" 
'''
env = { _.file = "/tmp/.env.tmp" }
run = """
	if echo "${usage_version?}" | grep -q -- "-dev"; then
		echo 'ROLLBAR_ENVIRONMENT=development' >> /tmp/.env.tmp;
	elif echo "${usage_version?}" | grep -vq -- "-"; then
		echo 'ROLLBAR_ENVIRONMENT=production' >> /tmp/.env.tmp;
	else
		echo 'ROLLBAR_ENVIRONMENT=prerelease' >> /tmp/.env.tmp;
	fi
    echo "Set ROLLBAR_ENVIRONMENT based on version: $(grep ROLLBAR_ENVIRONMENT /tmp/.env.tmp | cut -d= -f2)"
"""
quiet = false

[tasks.all]
depends = [
    { task = "//backend:build", args = ["--arch=x86_64"] , env = { GOARCH = "amd64" } },
    { task = "//backend:build", args = ["--arch=aarch64"], env = { GOARCH = "arm64" } },
]