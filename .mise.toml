[env]
HK_MISE = 1
_.source = { path = "scripts/env.sh", tools = true }

[hooks]
# Automatically install/update hooks when tools are installed
postinstall = "hk install --mise"

[tasks]
docs = "mise run docs-toc && mise run docs-fix && mise run docs-validate"
docs-toc = "find . -name '*.md' -not -path './node_modules/*' -not -path './frontend/node_modules/*' -not -path './backend/src/vendor/*' -not -path './.vale/*' -not -path './.github/*' -not -path './docs/tasks/*' -not -path './.ai/*' -not -path './.zencoder/*' | xargs bunx doctoc --github"
docs-validate = "./scripts/validate-docs.sh"
docs-fix = "./scripts/validate-docs.sh --fix"
brand-images = "python3 scripts/generate-brand-images.py"
clean-local-branches = "scripts/cleanup-old-local-branches.sh"
clean-local-branches-dry = "scripts/cleanup-old-local-branches.sh --dry"
clean-local-tags = "scripts/cleanup-old-local-tags.sh"
clean-local-tags-dry = "scripts/cleanup-old-local-tags.sh --dry"

[tasks.pre-commit]
run = "hk run pre-commit"
quiet = true

[tasks.test]
run = [
  { tasks = [
    "//backend:test",
    "//frontend:test",
    "//custom_components:test",
  ] },
]
quiet = true

[tasks.all]
alias = ["build:all", "build:release"]
usage = '''
flag "--version <version>" help="Build version"
'''
run = """
   echo "Running full build with version: ${usage_version:-not provided}"
  mise run //backend:build --arch=x86_64 --version={{usage.version}} --sentry_dsn=${SENTRY_DSN:-disabled}
  mise run //backend:build --arch=aarch64 --version={{usage.version}} --sentry_dsn=${SENTRY_DSN:-disabled}
  """
quiet = true

[tasks.release]
description = "Run the release process, which includes building the project and performing any necessary release steps. Optionally accepts a version flag to specify the release version."
usage = '''
flag "--version <version>" help="Release version"
'''
run = [
  'echo "Running release process with version: ${usage_version:-not provided}"',
  './scripts/release.sh --interactive ${usage_version:+--version ${usage_version?}}',
]
quiet = true


