experimental_monorepo_root = true

[monorepo]
config_roots = [
    "frontend",
    "backend",
    "custom_components",     
]

[settings]
npm.package_manager = "bun"
npm.bun = true
env_shell_expand = true

[settings.python]
compile = false
[tools]
act = "0.2.86"
vale = "3.14.1"
markdownlint-cli2 = "0.22.0"
prettier = "3.8.1"
"npm:doctoc" = "2.3.0"
prek = "0.3.8"
bun = "1.3.11"



[tools."http:lychee"]
